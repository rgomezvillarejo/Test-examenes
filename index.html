<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oposiciones App</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    select, input {
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
    }

    .card {
      padding: 15px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   📦 ESTADO GLOBAL
========================= */

const state = {
  view: "login",
  user: "",
  modo: "",
  catalogo: [],
  preguntas: [],
  examenPreguntas: [],   // 👈 examen congelado
  actual: 0,
  respuestas: []
};

/* =========================
   🔧 UTILIDADES
========================= */

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

/* =========================
   🚀 INIT
========================= */

async function init() {
  try {
    const res = await fetch("catalogo.json");

    if (!res.ok) throw new Error("No se pudo cargar catalogo.json");

    state.catalogo = await res.json();

    render();

  } catch (e) {
    document.getElementById("app").innerHTML = `
      <h2>❌ Error cargando catálogo</h2>
      <p>${e.message}</p>
    `;
  }
}

/* =========================
   🎯 RENDER CENTRAL
========================= */

function render() {
  const app = document.getElementById("app");

  if (state.view === "login") {
    app.innerHTML = viewLogin();
  }

  if (state.view === "selector") {
    app.innerHTML = viewSelector();
  }

  if (state.view === "examen") {
    app.innerHTML = viewExamen();
  }

  if (state.view === "resultado") {
    app.innerHTML = viewResultado();
  }
}

/* =========================
   🧾 VISTAS
========================= */

function viewLogin() {
  return `
    <h1>Oposiciones App</h1>

    <input id="user" placeholder="Tu nombre" />

    <button onclick="goSelector()">Continuar</button>
  `;
}

function viewSelector() {

  let options = state.catalogo.map((t, i) =>
    `<option value="${i}">${t.nombre}</option>`
  ).join("");

  return `
    <h2>Hola ${state.user}</h2>

    <div style="display:flex; gap:20px; align-items:flex-start;">

      <div style="flex:1;">
        <h3>🎯 Juego de preguntas</h3>

        <select id="test">
          ${options}
        </select>
      </div>

      <div style="flex:1;">
        <h3>⚙️ Modo</h3>

        <label>
          <input type="radio" name="modo" value="estudio" checked>
          📘 Estudio
        </label>

        <br><br>

        <label>
          <input type="radio" name="modo" value="examen">
          🧪 Examen
        </label>
      </div>

    </div>

    <button onclick="startExamFromUI()">
      ➡️ Adelante
    </button>
  `;
}

function viewExamen() {

  const p = state.examenPreguntas[state.actual];

  return `
    <h3>Pregunta ${state.actual + 1} / ${state.examenPreguntas.length}</h3>

    <div class="card">
      ${p.pregunta}
    </div>

    ${p.opciones.map(op =>
      `<button onclick="answer(${op.correcta ? 1 : 0})">
        ${op.texto}
      </button>`
    ).join("")}
  `;
}

function viewResultado() {

  let correctas = 0;

  state.respuestas.forEach(r => {
    if (r === 1) correctas++;
  });

  return `
    <h2>Resultado</h2>

    <p>Usuario: ${state.user}</p>
    <p>Modo: ${state.modo}</p>

    <p>✔ Correctas: ${correctas}</p>
    <p>❌ Fallos: ${state.examenPreguntas.length - correctas}</p>

    <p>Nota: ${(10 * correctas / state.examenPreguntas.length).toFixed(2)}</p>

    <button onclick="reset()">Volver al inicio</button>
  `;
}

/* =========================
   🎮 ACCIONES
========================= */

function goSelector() {
  state.user = document.getElementById("user").value || "Anónimo";
  state.view = "selector";
  render();
}

function startExamFromUI() {

  const index = document.getElementById("test").value;

  const modo = document.querySelector('input[name="modo"]:checked').value;

  startExam(modo, index);
}

/* =========================
   🧪 START EXAM (CONGELADO)
========================= */

async function startExam(modo, index) {

  const file = state.catalogo[index].archivo;

  try {
    const res = await fetch(file);

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    if (!Array.isArray(data) || data.length === 0) {
      throw new Error("JSON vacío o mal formado");
    }

    // 🧠 congelamos examen
    state.examenPreguntas = data.map(p => {

      let opciones = p.opciones.map((op, i) => ({
        texto: op,
        correcta: i === p.correcta
      }));

      shuffle(opciones);

      return {
        pregunta: p.pregunta,
        opciones
      };
    });

    state.modo = modo;
    state.actual = 0;
    state.respuestas = [];
    state.view = "examen";

    render();

  } catch (e) {
    document.getElementById("app").innerHTML = `
      <h2>❌ Error cargando test</h2>
      <p><b>Archivo:</b> ${file}</p>
      <p style="color:red;">${e.message}</p>

      <button onclick="reset()">Volver</button>
    `;
  }
}

/* =========================
   🎯 RESPUESTA
========================= */

function answer(isCorrect) {

  state.respuestas[state.actual] = isCorrect;

  state.actual++;

  if (state.actual >= state.examenPreguntas.length) {
    state.view = "resultado";
  }

  render();
}

/* =========================
   🔁 RESET
========================= */

function reset() {
  state.view = "selector";
  state.actual = 0;
  state.respuestas = [];
  render();
}

/* ========================= */

init();

</script>

</body>
</html>
