<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Test Interactivo</title>

  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #4a90e2;
      --primary-dark: #357ABD;
      --text: #333;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    h1, h2 {
      text-align: center;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #ccc;
      margin-top: 8px;
      font-size: 16px;
    }

    .opcion {
      background: #f0f4f8;
      padding: 12px;
      border-radius: var(--radius);
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .opcion input {
      transform: scale(1.3);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: var(--primary-dark);
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      #app { padding: 18px; }
      button { font-size: 16px; padding: 12px; }
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    const state = {
      user: "",
      modo: "",
      catalogo: [],
      juegosSeleccionados: [],
      preguntas: [],
      respuestas: [],
      actual: 0
    };

    // -----------------------------
    // MEZCLAR OPCIONES (Fisher-Yates)
    // -----------------------------
    function mezclarOpciones(pregunta) {
      const opcionesOriginales = pregunta.opciones.map((texto, i) => ({
        texto,
        indiceOriginal: i
      }));

      for (let i = opcionesOriginales.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opcionesOriginales[i], opcionesOriginales[j]] =
          [opcionesOriginales[j], opcionesOriginales[i]];
      }

      pregunta.opcionesMezcladas = opcionesOriginales;

      pregunta.correctaMezclada = opcionesOriginales.findIndex(
        o => o.indiceOriginal === pregunta.correcta
      );
    }

    // -----------------------------
    // CARGAR CATALOGO
    // -----------------------------
    async function cargarCatalogo() {
      const res = await fetch("catalogo.json");
      state.catalogo = await res.json();
    }

    // -----------------------------
    // PANTALLA 1: NOMBRE
    // -----------------------------
    function viewNombre() {
      return `
        <h2>Bienvenido</h2>

        <label>Tu nombre:</label>
        <input id="user" type="text" placeholder="Escribe tu nombre">

        <button onclick="guardarNombre()">Continuar</button>
      `;
    }

    function guardarNombre() {
      const nombre = document.getElementById("user").value.trim();
      state.user = nombre || "Anónimo";
      renderSeleccionJuegos();
    }

    // -----------------------------
    // PANTALLA 2: SELECCIÓN DE JUEGOS
    // -----------------------------
    function viewSeleccionJuegos() {
      const lista = state.catalogo
        .map(juego => `
          <label class="opcion">
            <input type="checkbox" value="${juego.archivo}">
            ${juego.nombre}
          </label>
        `)
        .join("");

      return `
        <h2>Selecciona los juegos</h2>
        <p>Puedes elegir uno o varios.</p>

        ${lista}

        <button onclick="guardarJuegos()">Continuar</button>
      `;
    }

    function guardarJuegos() {
      const checks = [...document.querySelectorAll("input[type='checkbox']:checked")];

      if (checks.length === 0) {
        alert("Debes seleccionar al menos un juego.");
        return;
      }

      state.juegosSeleccionados = checks.map(c => c.value);

      renderSeleccionModo();
    }

    // -----------------------------
    // PANTALLA 3: SELECCIÓN DE MODO
    // -----------------------------
    function viewSeleccionModo() {
      return `
        <h2>Selecciona el modo</h2>

        <button onclick="iniciar('examen')">Modo Examen</button>
        <button onclick="iniciar('estudio')">Modo Estudio</button>
      `;
    }

    // -----------------------------
    // INICIAR TEST (CARGAR JSON + MEZCLAR)
    // -----------------------------
    async function iniciar(modo) {
      state.modo = modo;
      state.preguntas = [];
      state.respuestas = [];
      state.actual = 0;

      for (let archivo of state.juegosSeleccionados) {
        const res = await fetch(archivo);
        const preguntas = await res.json();

        preguntas.forEach(p => mezclarOpciones(p));

        state.preguntas.push(...preguntas);
      }

      renderPregunta();
    }

    // -----------------------------
    // PANTALLA DE PREGUNTA
    // -----------------------------
    function viewPregunta() {
      const p = state.preguntas[state.actual];

      const opcionesHTML = p.opcionesMezcladas
        .map((o, i) => `
          <div class="opcion">
            <input type="radio" name="op" value="${i}">
            <span>${o.texto}</span>
          </div>
        `)
        .join("");

      return `
        <h2>Pregunta ${state.actual + 1} / ${state.preguntas.length}</h2>

        <p>${p.pregunta}</p>

        ${opcionesHTML}

        <button onclick="guardarRespuesta()">Siguiente</button>
      `;
    }

    function guardarRespuesta() {
      const seleccion = document.querySelector("input[name='op']:checked");

      state.respuestas.push({
        pregunta: state.preguntas[state.actual],
        selected: seleccion ? Number(seleccion.value) : null
      });

      state.actual++;

      if (state.actual >= state.preguntas.length) {
        renderResultado();
      } else {
        renderPregunta();
      }
    }

    // -----------------------------
    // RESULTADO
    // -----------------------------
    function viewResultado() {

      if (state.modo === "estudio") {
        return `
          <h2>📘 Modo Estudio</h2>
          <p>En este modo no se calcula nota.</p>
          <button onclick="location.reload()">Volver</button>
        `;
      }

      let correctas = 0;

      for (let r of state.respuestas) {
        if (r.selected === r.pregunta.correctaMezclada) correctas++;
      }

      const total = state.preguntas.length;
      const fallos = total - correctas;
      const nota = (10 * correctas / total).toFixed(2);

      return `
        <h2>📊 Resultado</h2>

        <p><strong>Usuario:</strong> ${state.user}</p>
        <p><strong>Modo:</strong> ${state.modo}</p>

        <p>✔ Correctas: <strong>${correctas}</strong></p>
        <p>❌ Fallos: <strong>${fallos}</strong></p>

        <p style="font-size: 24px; margin-top: 20px;">
          Nota final: <strong>${nota}</strong>
        </p>

        <button onclick="location.reload()">Volver</button>
      `;
    }

    // -----------------------------
    // RENDERIZADO
    // -----------------------------
    async function render() {
      await cargarCatalogo();
      document.getElementById("app").innerHTML = viewNombre();
    }

    function renderSeleccionJuegos() {
      document.getElementById("app").innerHTML = viewSeleccionJuegos();
    }

    function renderSeleccionModo() {
      document.getElementById("app").innerHTML = viewSeleccionModo();
    }

    function renderPregunta() {
      document.getElementById("app").innerHTML = viewPregunta();
    }

    function renderResultado() {
      document.getElementById("app").innerHTML = viewResultado();
    }

    // INICIO
    render();
  </script>

</body>
</html>
