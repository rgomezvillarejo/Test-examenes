<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Test Interactivo</title>

  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #4a90e2;
      --primary-dark: #357ABD;
      --text: #333;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --ok: #2ecc71;
      --fail: #e74c3c;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    h1, h2 {
      text-align: center;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #ccc;
      margin-top: 8px;
      font-size: 16px;
    }

    .opcion {
      background: #f0f4f8;
      padding: 12px;
      border-radius: var(--radius);
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

    .correcta {
      border: 2px solid var(--ok);
    }

    .fallada {
      border: 2px solid var(--fail);
    }

    .icono {
      font-size: 20px;
      margin-left: auto;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: var(--primary-dark);
    }
  </style>
</head>

<body>

  <div id="app">Cargando...</div>

  <script>
    const state = {
      user: "",
      modo: "",
      catalogo: [],
      juegosSeleccionados: [],
      preguntas: [],
      respuestas: [],
      actual: 0,
      mostrarCorreccion: false
    };

    // -----------------------------
    // MEZCLAR OPCIONES
    // -----------------------------
    function mezclarOpciones(pregunta) {
      const opcionesOriginales = pregunta.opciones.map((texto, i) => ({
        texto,
        indiceOriginal: i
      }));

      for (let i = opcionesOriginales.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [opcionesOriginales[i], opcionesOriginales[j]] =
          [opcionesOriginales[j], opcionesOriginales[i]];
      }

      pregunta.opcionesMezcladas = opcionesOriginales;

      pregunta.correctaMezclada = opcionesOriginales.findIndex(
        o => o.indiceOriginal === pregunta.correcta
      );
    }

    // -----------------------------
    // CARGAR CATALOGO
    // -----------------------------
    async function cargarCatalogo() {
      try {
        const res = await fetch("catalogo.json");
        state.catalogo = await res.json();
      } catch (e) {
        document.getElementById("app").innerHTML =
          "<h2>Error cargando catalogo.json</h2><p>Asegúrate de que existe y está bien formado.</p>";
        console.error(e);
      }
    }
