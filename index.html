<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Test Interactivo</title>

  <!-- CHART.JS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #4a90e2;
      --primary-dark: #357ABD;
      --text: #333;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --ok: #2ecc71;
      --fail: #e74c3c;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    h1, h2 {
      text-align: center;
      font-weight: 600;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #ccc;
      margin-top: 8px;
      font-size: 16px;
    }

    .opcion {
      background: #f0f4f8;
      padding: 12px;
      border-radius: var(--radius);
      margin: 10px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .opcion.correcta {
      background: rgba(46, 204, 113, 0.25);
      border: 2px solid var(--ok);
    }

    .opcion.fallada {
      background: rgba(231, 76, 60, 0.25);
      border: 2px solid var(--fail);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: var(--primary-dark);
    }
  </style>
</head>

<body>

  <div id="app">Cargando...</div>

  <script>
    const state = {
      user: "",
      modo: "",
      catalogo: [],
      juegosSeleccionados: [],
      preguntas: [],
      totalPreguntasDisponibles: 0,
      numPreguntasElegidas: 0,
      estudioModoAleatorio: false,
      respuestas: [],
      actual: 0,
      mostrarCorreccion: false
    };

    function mezclarOpciones(p) {
      const textoCorrecto = p.opciones[p.correcta];
      p.opciones = [...p.opciones].sort(() => Math.random() - 0.5);
      p.correcta = p.opciones.findIndex(o => o === textoCorrecto);
    }

    async function cargarCatalogo() {
      const res = await fetch("./catalogo.json?nocache=" + Date.now());
      state.catalogo = await res.json();
      render();
    }

    function viewNombre() {
      return `
        <h2>Introduce tu nombre</h2>
        <input id="nombre" type="text" placeholder="Tu nombre">
        <button onclick="guardarNombre()">Continuar</button>
      `;
    }

    function guardarNombre() {
      const nombre = document.getElementById("nombre").value.trim();
      if (!nombre) return;
      state.user = nombre;
      render();
    }

    function viewSeleccionJuegos() {
      return `
        <h2>Hola ${state.user}</h2>
        <h3>Selecciona los juegos</h3>

        ${state.catalogo.map((j, i) => `
          <div class="opcion">
            <input type="checkbox" id="j${i}" value="${j.archivo}">
            <label for="j${i}">${j.nombre}</label>
          </div>
        `).join("")}

        <button onclick="guardarJuegos()">Continuar</button>

        <button style="background:#666;margin-top:10px" onclick="mostrarPantallaEstadisticas()">
          Ver estadísticas
        </button>
      `;
    }

    function guardarJuegos() {
      state.juegosSeleccionados = [];
      state.catalogo.forEach((j, i) => {
        const chk = document.getElementById("j" + i);
        if (chk.checked) state.juegosSeleccionados.push(chk.value);
      });
      if (state.juegosSeleccionados.length === 0) return;
      render();
    }

    function viewModo() {
      return `
        <h2>Selecciona el modo</h2>
        <button onclick="seleccionarModo('estudio')">Modo Estudio</button>
        <button onclick="seleccionarModo('examen')">Modo Examen</button>
      `;
    }

    function seleccionarModo(m) {
      state.modo = m;
      cargarPreguntasParaConfig();
    }

    async function cargarPreguntasParaConfig() {
      state.preguntas = [];

      for (let archivo of state.juegosSeleccionados) {
        const res = await fetch("./" + archivo + "?nocache=" + Date.now());
        const preguntas = await res.json();
        preguntas.forEach(p => mezclarOpciones(p));
        state.preguntas.push(...preguntas);
      }

      state.totalPreguntasDisponibles = state.preguntas.length;
      renderConfigPreguntas();
    }

    function renderConfigPreguntas() {

      if (state.modo === "estudio") {
        document.getElementById("app").innerHTML = `
          <h2>Modo Estudio</h2>
          <p>Total preguntas: ${state.totalPreguntasDisponibles}</p>

          <div class="opcion">
            <input type="radio" name="tipoEstudio" id="lineal" checked>
            <label for="lineal">Recorrido lineal (orden original)</label>
          </div>

          <div class="opcion">
            <input type="radio" name="tipoEstudio" id="aleatorio">
            <label for="aleatorio">Recorrido aleatorio</label>
          </div>

          <button onclick="iniciarEstudio()">Comenzar</button>
        `;
        return;
      }

      document.getElementById("app").innerHTML = `
        <h2>Modo Examen</h2>
        <p>Total disponibles: ${state.totalPreguntasDisponibles}</p>

        <input id="numPreg" type="number" 
               min="1" 
               max="${state.totalPreguntasDisponibles}" 
               placeholder="Número de preguntas">

        <button onclick="iniciarExamen()">Comenzar</button>
      `;
    }

    function iniciarEstudio() {
      const esAleatorio = document.getElementById("aleatorio").checked;
      state.estudioModoAleatorio = esAleatorio;

      if (esAleatorio) {
        state.preguntas = state.preguntas.sort(() => Math.random() - 0.5);
      }

      state.actual = 0;
      state.mostrarCorreccion = false;
      render();
    }

    function iniciarExamen() {
      const n = parseInt(document.getElementById("numPreg").value);
      if (!n || n < 1 || n > state.totalPreguntasDisponibles) return;

      state.numPreguntasElegidas = n;
      state.preguntas = state.preguntas.sort(() => Math.random() - 0.5).slice(0, n);
      state.actual = 0;
      state.mostrarCorreccion = false;
      render();
    }

    function viewPregunta() {
      const p = state.preguntas[state.actual];
      return `
        <h2>Pregunta ${state.actual + 1} / ${state.preguntas.length}</h2>
        <p>${p.pregunta}</p>
        ${p.opciones.map((o, i) => `
          <div class="opcion" onclick="responder(${i})">
            ${o}
          </div>
        `).join("")}
      `;
    }

    function responder(i) {
      state.respuestas[state.actual] = i;
      state.mostrarCorreccion = true;
      render();
    }

    function viewCorreccion() {
      const p = state.preguntas[state.actual];
      return `
        <h2>Corrección</h2>
        <p>${p.pregunta}</p>
        ${p.opciones.map((o, i) => `
          <div class="opcion ${i === p.correcta ? 'correcta' : (i === state.respuestas[state.actual] ? 'fallada' : '')}">
            ${o}
          </div>
        `).join("")}
        <button onclick="siguiente()">Siguiente</button>
      `;
    }

    function siguiente() {
      state.actual++;
      state.mostrarCorreccion = false;

      if (state.actual >= state.preguntas.length) {
        renderResultados();
      } else {
        render();
      }
    }

    /* ---------------------------------------------------
       SISTEMA DE ESTADÍSTICAS POR USUARIO
    --------------------------------------------------- */

    function guardarResultadoTest(resultado) {
      const clave = "historialTests_" + state.user;
      const historial = JSON.parse(localStorage.getItem(clave) || "[]");
      historial.push(resultado);
      localStorage.setItem(clave, JSON.stringify(historial));
    }

    function actualizarEstadisticasPreguntas() {
      const clave = "estadisticasPreguntas_" + state.user;
      let stats = JSON.parse(localStorage.getItem(clave) || "{}");

      state.preguntas.forEach((p, i) => {
        const id = p.pregunta;

        if (!stats[id]) {
          stats[id] = { veces: 0, aciertos: 0, fallos: 0 };
        }

        stats[id].veces++;

        if (state.respuestas[i] === p.correcta) {
          stats[id].aciertos++;
        } else {
          stats[id].fallos++;
        }
      });

      localStorage.setItem(clave, JSON.stringify(stats));
    }

    /* ---------------------------------------------------
       PANTALLA PRINCIPAL DE ESTADÍSTICAS
    --------------------------------------------------- */

    function mostrarPantallaEstadisticas() {
      document.getElementById("app").innerHTML = `
        <h2>Estadísticas de ${state.user}</h2>

        <div class="opcion" onclick="pantallaEvolucionDesempeno()">
          📈 Evolución del desempeño
        </div>

        <div class="opcion" onclick="pantallaHistorialTests()">
          📋 Historial de tests realizados
        </div>

        <div class="opcion" onclick="pantallaPreguntasFalladas()">
          ❌ Preguntas más falladas
        </div>

        <button onclick="render()">Volver</button>

        <button style="background:#b30000;margin-top:10px" onclick="resetearEstadisticas()">
          Resetear estadísticas
        </button>
      `;
    }

    function resetearEstadisticas() {
      const ok = confirm("¿Seguro que quieres borrar TODAS tus estadísticas? Esta acción no se puede deshacer.");

      if (!ok) return;

      localStorage.removeItem("historialTests_" + state.user);
      localStorage.removeItem("estadisticasPreguntas_" + state.user);

      alert("Estadísticas del usuario " + state.user + " borradas correctamente.");

      mostrarPantallaEstadisticas();
    }

    /* ---------------------------------------------------
       A) EVOLUCIÓN DEL DESEMPEÑO (CHART.JS)
    --------------------------------------------------- */

    function pantallaEvolucionDesempeno() {
      const clave = "historialTests_" + state.user;
      const historial = JSON.parse(localStorage.getItem(clave) || "[]");

      if (historial.length === 0) {
        document.getElementById("app").innerHTML = `
          <h2>Evolución del desempeño</h2>
          <p>No hay datos todavía.</p>
          <button onclick="mostrarPantallaEstadisticas()">Volver</button>
        `;
        return;
      }

      document.getElementById("app").innerHTML = `
        <h2>Evolución del desempeño</h2>
        <canvas id="graficaDesempeno" width="400" height="300"></canvas>
        <button onclick="mostrarPantallaEstadisticas()">Volver</button>
      `;

      const labels = historial.map(t => new Date(t.fecha).toLocaleDateString());
      const datos = historial.map(t => Number(t.porcentaje));

      const ctx = document.getElementById("graficaDesempeno").getContext("2d");

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Porcentaje de aciertos',
            data: datos,
            backgroundColor: 'rgba(74, 144, 226, 0.6)',
            borderColor: 'rgba(74, 144, 226, 1)',
            borderWidth: 2
          }]
        },
        options: {
          indexAxis: 'y',
          scales: {
            x: {
              min: 0,
              max: 100,
              ticks: { stepSize: 10 }
            }
          }
        }
      });
    }

    /* ---------------------------------------------------
       B) HISTORIAL DE TESTS
    --------------------------------------------------- */

    function pantallaHistorialTests() {
      const clave = "historialTests_" + state.user;
      const historial = JSON.parse(localStorage.getItem(clave) || "[]");

      if (historial.length === 0) {
        document.getElementById("app").innerHTML = `
          <h2>Historial de tests</h2>
          <p>No hay tests realizados.</p>
          <button onclick="mostrarPantallaEstadisticas()">Volver</button>
        `;
        return;
      }

      const lista = historial.map(t => `
        <div class="opcion">
          📅 ${new Date(t.fecha).toLocaleString()}<br>
          Modo: ${t.modo}<br>
          Aciertos: ${t.aciertos}/${t.total}<br>
          Porcentaje: ${t.porcentaje}%
        </div>
      `).join("");

      document.getElementById("app").innerHTML = `
        <h2>Historial de tests</h2>
        ${lista}
        <button onclick="mostrarPantallaEstadisticas()">Volver</button>
      `;
    }

    /* ---------------------------------------------------
       C) PREGUNTAS MÁS FALLADAS
    --------------------------------------------------- */

    function pantallaPreguntasFalladas() {
      const clave = "estadisticasPreguntas_" + state.user;
      const stats = JSON.parse(localStorage.getItem(clave) || "{}");

      const ordenadas = Object.entries(stats)
        .sort((a, b) => b[1].fallos - a[1].fallos);

      if (ordenadas.length === 0) {
        document.getElementById("app").innerHTML = `
          <h2>Preguntas más falladas</h2>
          <p>No hay datos todavía.</p>
          <button onclick="mostrarPantallaEstadisticas()">Volver</button>
        `;
        return;
      }

      const lista = ordenadas.map(([pregunta, datos]) => `
        <div class="opcion">
          <strong>${pregunta}</strong><br>
          Fallos: ${datos.fallos}<br>
          Aciertos: ${datos.aciertos}<br>
          Veces mostrada: ${datos.veces}
        </div>
      `).join("");

      document.getElementById("app").innerHTML = `
        <h2>Preguntas más falladas</h2>
        ${lista}
        <button onclick="mostrarPantallaEstadisticas()">Volver</button>
      `;
    }


    /* ---------------------------------------------------
       RESULTADOS
    --------------------------------------------------- */

    function renderResultados() {
      const total = state.preguntas.length;
      const aciertos = state.respuestas.filter((r, i) => r === state.preguntas[i].correcta).length;
      const porcentaje = ((aciertos / total) * 100).toFixed(2);

      guardarResultadoTest({
        fecha: new Date().toISOString(),
        usuario: state.user,
        modo: state.modo,
        total,
        aciertos,
        porcentaje
      });

      actualizarEstadisticasPreguntas();

      document.getElementById("app").innerHTML = `
        <h2>Resultados</h2>
        <p>Usuario: <strong>${state.user}</strong></p>
        <p>Aciertos: ${aciertos} / ${total}</p>
        <p>Porcentaje: <strong>${porcentaje}%</strong></p>
        <p>Nota (sobre 10): <strong>${(aciertos * 10 / total).toFixed(2)}</strong></p>

        <button onclick="location.reload()">Reiniciar</button>
      `;
    }

    /* ---------------------------------------------------
       RENDER PRINCIPAL
    --------------------------------------------------- */

    function render() {
      if (!state.user) {
        document.getElementById("app").innerHTML = viewNombre();
        return;
      }

      if (state.juegosSeleccionados.length === 0) {
        document.getElementById("app").innerHTML = viewSeleccionJuegos();
        return;
      }

      if (!state.modo) {
        document.getElementById("app").innerHTML = viewModo();
        return;
      }

      if (state.mostrarCorreccion) {
        document.getElementById("app").innerHTML = viewCorreccion();
        return;
      }

      if (state.preguntas.length > 0 && state.actual < state.preguntas.length) {
        document.getElementById("app").innerHTML = viewPregunta();
        return;
      }
    }

    cargarCatalogo();
  </script>

</body>
</html>
