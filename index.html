<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Test Interactivo</title>

  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --primary: #4a90e2;
      --primary-dark: #357ABD;
      --text: #333;
      --radius: 14px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      padding: 25px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    h1, h2 {
      text-align: center;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #ccc;
      margin-top: 8px;
      font-size: 16px;
    }

    .opcion {
      background: #f0f4f8;
      padding: 12px;
      border-radius: var(--radius);
      margin: 10px 0;
      display: flex;
      align-items: center;
    }

    .opcion input {
      transform: scale(1.3);
      margin-right: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: var(--primary-dark);
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      #app { padding: 18px; }
      button { font-size: 16px; padding: 12px; }
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    const state = {
      user: "",
      modo: "",
      preguntas: [],
      respuestas: [],
      actual: 0
    };

    // -----------------------------
    // CARGAR CATALOGO
    // -----------------------------
    async function cargarCatalogo() {
      const res = await fetch("catalogo.json");
      return await res.json();
    }

    // -----------------------------
    // VISTA: SELECCIÓN DE JUEGO
    // -----------------------------
    function viewSeleccionJuego(catalogo) {
      const lista = catalogo
        .map(juego => `
          <button onclick="seleccionarJuego('${juego.archivo}')">
            ${juego.nombre}
          </button>
        `)
        .join("");

      return `
        <h1>Selecciona un juego</h1>
        ${lista}
      `;
    }

    // -----------------------------
    // CARGAR JUEGO SELECCIONADO
    // -----------------------------
    async function seleccionarJuego(archivo) {
      const res = await fetch(archivo);
      state.preguntas = await res.json();
      state.actual = 0;
      state.respuestas = [];
      renderInicio();
    }

    // -----------------------------
    // VISTA: INICIO (NOMBRE + MODO)
    // -----------------------------
    function viewInicio() {
      return `
        <h2>Bienvenido</h2>

        <label>Tu nombre:</label>
        <input id="user" type="text" placeholder="Escribe tu nombre">

        <button onclick="iniciar('examen')">Modo Examen</button>
        <button onclick="iniciar('estudio')">Modo Estudio</button>
      `;
    }

    function iniciar(modo) {
      state.user = document.getElementById("user").value || "Anónimo";
      state.modo = modo;
      state.actual = 0;
      state.respuestas = [];
      renderPregunta();
    }

    // -----------------------------
    // VISTA: PREGUNTA
    // -----------------------------
    function viewPregunta() {
      const p = state.preguntas[state.actual];

      const opcionesHTML = p.opciones
        .map((texto, i) => `
          <div class="opcion">
            <input type="radio" name="op" value="${i}">
            <span>${texto}</span>
          </div>
        `)
        .join("");

      return `
        <h2>Pregunta ${state.actual + 1} / ${state.preguntas.length}</h2>

        <p>${p.pregunta}</p>

        ${opcionesHTML}

        <button onclick="guardarRespuesta()">Siguiente</button>
      `;
    }

    function guardarRespuesta() {
      const seleccion = document.querySelector("input[name='op']:checked");

      state.respuestas.push({
        pregunta: state.preguntas[state.actual],
        selected: seleccion ? Number(seleccion.value) : null
      });

      state.actual++;

      if (state.actual >= state.preguntas.length) {
        renderResultado();
      } else {
        renderPregunta();
      }
    }

    // -----------------------------
    // VISTA: RESULTADO
    // -----------------------------
    function viewResultado() {

      if (state.modo === "estudio") {
        return `
          <h2>📘 Modo Estudio</h2>
          <p>En este modo no se calcula nota.</p>
          <button onclick="location.reload()">Volver</button>
        `;
      }

      let correctas = 0;

      for (let r of state.respuestas) {
        if (r.selected === r.pregunta.correcta) correctas++;
      }

      const total = state.preguntas.length;
      const fallos = total - correctas;
      const nota = (10 * correctas / total).toFixed(2);

      return `
        <h2>📊 Resultado</h2>

        <p><strong>Usuario:</strong> ${state.user}</p>
        <p><strong>Modo:</strong> ${state.modo}</p>

        <p>✔ Correctas: <strong>${correctas}</strong></p>
        <p>❌ Fallos: <strong>${fallos}</strong></p>

        <p style="font-size: 24px; margin-top: 20px;">
          Nota final: <strong>${nota}</strong>
        </p>

        <button onclick="location.reload()">Volver</button>
      `;
    }

    // -----------------------------
    // RENDERIZADO
    // -----------------------------
    async function render() {
      const catalogo = await cargarCatalogo();
      document.getElementById("app").innerHTML = viewSeleccionJuego(catalogo);
    }

    function renderInicio() {
      document.getElementById("app").innerHTML = viewInicio();
    }

    function renderPregunta() {
      document.getElementById("app").innerHTML = viewPregunta();
    }

    function renderResultado() {
      document.getElementById("app").innerHTML = viewResultado();
    }

    // INICIO
    render();
  </script>

</body>
</html>
