<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oposiciones App</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    input {
      padding: 8px;
      box-sizing: border-box;
    }

    .card {
      padding: 15px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 15px;
    }

    .col-left {
      flex: 1;
      font-weight: bold;
    }

    .col-right {
      flex: 2;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   📦 ESTADO GLOBAL
========================= */

const state = {
  view: "login",
  user: "",
  modo: "",
  catalogo: [],
  examenPreguntas: [],
  actual: 0,
  respuestas: [],

  studyAnswered: false,
  studySelected: null
};

/* =========================
   🔧 UTIL
========================= */

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

/* =========================
   🚀 INIT
========================= */

async function init() {
  const res = await fetch("catalogo.json");
  state.catalogo = await res.json();
  render();
}

/* =========================
   🎯 RENDER
========================= */

function render() {
  const app = document.getElementById("app");

  if (state.view === "login") app.innerHTML = viewLogin();
  if (state.view === "selector") app.innerHTML = viewSelector();
  if (state.view === "examen") app.innerHTML = viewExamen();
  if (state.view === "resultado") app.innerHTML = viewResultado();
}

/* =========================
   🧾 LOGIN
========================= */

function viewLogin() {
  return `
    <h1>🧠 Oposiciones App</h1>

    <input id="user" placeholder="Tu nombre" />

    <button onclick="goSelector()">Continuar</button>
  `;
}

/* =========================
   ⚙️ SELECTOR
========================= */

function viewSelector() {

  let tests = state.catalogo.map((t, i) => `
    <div class="option-row">
      <input type="checkbox" class="test-check" value="${i}">
      <span>${t.nombre}</span>
    </div>
  `).join("");

  return `
    <h2>Hola ${state.user}</h2>

    <div class="row">
      <div class="col-left">🎯 Juego de preguntas</div>
      <div class="col-right">${tests}</div>
    </div>

    <div class="row">
      <div class="col-left">⚙️ Modo</div>
      <div class="col-right">

        <div class="option-row">
          <input type="radio" name="modo" value="estudio" checked>
          📘 Estudio
        </div>

        <div class="option-row">
          <input type="radio" name="modo" value="examen">
          🧪 Examen
        </div>

      </div>
    </div>

    <button onclick="startExamFromUI()">➡️ Adelante</button>
  `;
}

/* =========================
   🚀 START EXAM MULTI JSON
========================= */

async function startExamFromUI() {

  const selected = [...document.querySelectorAll(".test-check:checked")]
    .map(c => parseInt(c.value));

  const modo = document.querySelector('input[name="modo"]:checked').value;

  if (selected.length === 0) {
    alert("Selecciona al menos un test");
    return;
  }

  let all = [];

  for (let i of selected) {
    const file = state.catalogo[i].archivo;
    const res = await fetch(file);
    const data = await res.json();
    all = all.concat(data);
  }

  startExam(modo, all);
}

/* =========================
   🧪 START EXAM (FIX PRINCIPAL)
========================= */

function startExam(modo, data) {

  state.examenPreguntas = data.map(p => {

    let opciones = p.opciones.map((op, i) => ({
      texto: op,
      correcta: i === p.correcta
    }));

    shuffle(opciones);

    return {
      pregunta: p.pregunta,
      opciones,
      selected: null   // 👈 FIX CLAVE
    };
  });

  state.modo = modo;
  state.actual = 0;
  state.respuestas = [];
  state.studyAnswered = false;
  state.studySelected = null;

  state.view = "examen";

  render();
}

/* =========================
   🧪 EXAMEN VIEW
========================= */

function viewExamen() {

  const p = state.examenPreguntas[state.actual];
  const isStudy = state.modo === "estudio";
  const answered = state.studyAnswered;

  return `
    <h3>Pregunta ${state.actual + 1} / ${state.examenPreguntas.length}</h3>

    <div class="card">
      ${p.pregunta}
    </div>

    ${p.opciones.map((op, i) => {

      let style = "";

      if (isStudy && answered) {

        if (state.studySelected === i) {
          style = op.correcta ? "background:#d4edda" : "background:#f8d7da";
        }

        if (op.correcta && state.studySelected !== i) {
          return `
            <button disabled style="background:#d4edda">
              👉 ${op.texto}
            </button>
          `;
        }
      }

      return `
        <button
          onclick="selectAnswer(${i})"
          ${answered && isStudy ? "disabled" : ""}
          style="${style}"
        >
          ${op.texto}
        </button>
      `;
    }).join("")}

    ${state.modo === "examen" ? `
      <button onclick="answer()" ${p.selected === null ? "disabled" : ""}>
        Confirmar respuesta
      </button>
    ` : ""}

    ${state.modo === "estudio" && state.studyAnswered ? `
      <button onclick="nextStudyQuestion()">➡️ Siguiente pregunta</button>
    ` : ""}
  `;
}

/* =========================
   🎯 SELECT ANSWER (FIX)
========================= */

function selectAnswer(i) {

  const p = state.examenPreguntas[state.actual];

  if (state.modo === "examen") {
    p.selected = i;   // 👈 FIX CRÍTICO
    render();
    return;
  }

  state.studySelected = i;
  state.studyAnswered = true;

  render();
}

/* =========================
   🧪 NEXT STUDY
========================= */

function nextStudyQuestion() {

  state.studyAnswered = false;
  state.studySelected = null;

  state.actual++;

  if (state.actual >= state.examenPreguntas.length) {
    state.view = "resultado";
  }

  render();
}

/* =========================
   🧪 ANSWER (FIX DEFINITIVO)
========================= */

function answer() {

  const p = state.examenPreguntas[state.actual];

  const isCorrect = p.opciones[p.selected]?.correcta === true;

  state.respuestas.push({
    preguntaId: state.actual,
    correcta: isCorrect
  });

  p.selected = null;

  state.actual++;

  if (state.actual >= state.examenPreguntas.length) {
    state.view = "resultado";
  }

  render();
}

/* =========================
   📊 RESULTADO
========================= */

function viewResultado() {

  const correctas = state.respuestas.filter(r => r.correcta).length;

  return `
    <h2>📊 Resultado</h2>

    <p>Usuario: ${state.user}</p>
    <p>Modo: ${state.modo}</p>

    <p>✔ Correctas: ${correctas}</p>
    <p>❌ Fallos: ${state.examenPreguntas.length - correctas}</p>

    <p>Nota: ${(10 * correctas / state.examenPreguntas.length).toFixed(2)}</p>

    <button onclick="location.reload()">Volver</button>
  `;
}

/* =========================
   🔁 NAV
========================= */

function goSelector() {
  state.user = document.getElementById("user").value || "Anónimo";
  state.view = "selector";
  render();
}

/* ========================= */

init();

</script>

</body>
</html>
