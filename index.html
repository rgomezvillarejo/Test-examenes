<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oposiciones App</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    select {
      padding: 8px;
    }

    .card {
      padding: 15px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
/* =========================
   📦 ESTADO GLOBAL
========================= */

const state = {
  view: "login",
  user: "",
  modo: "",
  catalogo: [],
  preguntas: [],
  actual: 0,
  respuestas: []
};

/* =========================
   🚀 INIT
========================= */

async function init() {
  const res = await fetch("Catalogo.json");
  state.catalogo = await res.json();
  render();
}

/* =========================
   🎯 RENDER CENTRAL
========================= */

function render() {
  const app = document.getElementById("app");

  if (state.view === "login") {
    app.innerHTML = viewLogin();
  }

  if (state.view === "selector") {
    app.innerHTML = viewSelector();
  }

  if (state.view === "examen") {
    app.innerHTML = viewExamen();
  }

  if (state.view === "resultado") {
    app.innerHTML = viewResultado();
  }
}

/* =========================
   🧾 VISTAS
========================= */

function viewLogin() {
  return `
    <h1>Oposiciones App</h1>

    <input id="user" placeholder="Tu nombre" style="padding:8px;width:100%;" />

    <button onclick="goSelector()">Continuar</button>
  `;
}

function viewSelector() {

  let options = state.catalogo.map((t, i) =>
    `<option value="${i}">${t.nombre}</option>`
  ).join("");

  return `
    <h2>Hola ${state.user}</h2>

    <div style="display:flex; gap:20px; align-items:flex-start;">

      <!-- IZQUIERDA -->
      <div style="flex:1;">
        <h3>🎯 Juego de preguntas</h3>

        <select id="test" style="width:100%;">
          ${options}
        </select>
      </div>

      <!-- DERECHA -->
      <div style="flex:1;">
        <h3>⚙️ Modo</h3>

        <label>
          <input type="radio" name="modo" value="estudio" checked>
          📘 Estudio
        </label>

        <br><br>

        <label>
          <input type="radio" name="modo" value="examen">
          🧪 Examen
        </label>
      </div>

    </div>

    <br><br>

    <button onclick="startExamFromUI()" style="font-size:16px;">
      ➡️ Adelante
    </button>
  `;
}

function viewExamen() {

  const p = state.preguntas[state.actual];

  return `
    <h3>Pregunta ${state.actual + 1} / ${state.preguntas.length}</h3>

    <div class="card">
      ${p.pregunta}
    </div>

    ${p.opciones.map((op, i) =>
      `<button onclick="answer(${i})">${op}</button>`
    ).join("")}
  `;
}

function viewResultado() {

  let correctas = 0;

  state.preguntas.forEach((p, i) => {
    if (state.respuestas[i] === p.correcta) correctas++;
  });

  return `
    <h2>Resultado</h2>

    <p>Usuario: ${state.user}</p>
    <p>Modo: ${state.modo}</p>

    <p>✔ Correctas: ${correctas}</p>
    <p>❌ Fallos: ${state.preguntas.length - correctas}</p>

    <p>Nota: ${(10 * correctas / state.preguntas.length).toFixed(2)}</p>

    <button onclick="reset()">Volver al inicio</button>
  `;
}

/* =========================
   🎮 ACCIONES
========================= */

function goSelector() {
  state.user = document.getElementById("user").value || "Anónimo";
  state.view = "selector";
  render();
}

function startExamFromUI() {

  const index = document.getElementById("test").value;

  const modo = document.querySelector('input[name="modo"]:checked').value;

  startExam(modo, index);
}

async function startExam(modo, index) {

  const file = state.catalogo[index].archivo;

  const res = await fetch(file);
  state.preguntas = await res.json();

  state.modo = modo;
  state.actual = 0;
  state.respuestas = [];

  state.view = "examen";
  render();
}

function answer(i) {
  state.respuestas[state.actual] = i;
  state.actual++;

  if (state.actual >= state.preguntas.length) {
    state.view = "resultado";
  }

  render();
}

function reset() {
  state.view = "selector";
  state.actual = 0;
  state.respuestas = [];
  render();
}

/* ========================= */

init();
</script>

</body>
</html>
