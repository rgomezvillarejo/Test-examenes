<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oposiciones App</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }

    select, input {
      padding: 8px;
      box-sizing: border-box;
    }

    .card {
      padding: 15px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 20px;
    }

    .col-left {
      flex: 1;
      font-weight: bold;
    }

    .col-right {
      flex: 2;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

/* =========================
   📦 ESTADO GLOBAL
========================= */

const state = {
  view: "login",
  user: "",
  modo: "",
  catalogo: [],
  preguntas: [],
  examenPreguntas: [],
  actual: 0,
  respuestas: []
};

/* =========================
   🔧 UTILIDADES
========================= */

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

/* =========================
   🚀 INIT
========================= */

async function init() {
  const res = await fetch("catalogo.json");
  state.catalogo = await res.json();
  render();
}

/* =========================
   🎯 RENDER
========================= */

function render() {
  const app = document.getElementById("app");

  if (state.view === "login") app.innerHTML = viewLogin();
  if (state.view === "selector") app.innerHTML = viewSelector();
  if (state.view === "examen") app.innerHTML = viewExamen();
  if (state.view === "resultado") app.innerHTML = viewResultado();
}

/* =========================
   🧾 LOGIN
========================= */

function viewLogin() {
  return `
    <h1>🧠 Oposiciones App</h1>

    <input id="user" placeholder="Tu nombre" />

    <button onclick="goSelector()">Continuar</button>
  `;
}

/* =========================
   ⚙️ SELECTOR NUEVO
========================= */

function viewSelector() {

  let tests = state.catalogo.map((t, i) => `
    <div class="option-row">
      <input type="checkbox" value="${i}" class="test-check">
      <span>${t.nombre}</span>
    </div>
  `).join("");

  return `
    <h2>Hola ${state.user}</h2>

    <!-- JUEGO DE PREGUNTAS -->
    <div class="row">
      <div class="col-left">🎯 Juego de preguntas</div>

      <div class="col-right">
        ${tests}
      </div>
    </div>

    <!-- MODO -->
    <div class="row">
      <div class="col-left">⚙️ Modo</div>

      <div class="col-right">
        <div class="option-row">
          <input type="radio" name="modo" value="estudio" checked>
          📘 Estudio
        </div>

        <div class="option-row">
          <input type="radio" name="modo" value="examen">
          🧪 Examen
        </div>
      </div>
    </div>

    <button onclick="startExamFromUI()">
      ➡️ Adelante
    </button>
  `;
}

/* =========================
   🧠 START EXAM MULTI-JSON
========================= */

async function startExamFromUI() {

  const selected = [...document.querySelectorAll(".test-check:checked")]
    .map(c => parseInt(c.value));

  const modo = document.querySelector('input[name="modo"]:checked').value;

  if (selected.length === 0) {
    alert("Selecciona al menos un juego de preguntas");
    return;
  }

  let all = [];

  for (let i of selected) {
    const file = state.catalogo[i].archivo;

    const res = await fetch(file);
    const data = await res.json();

    all = all.concat(data);
  }

  startExam(modo, all);
}

/* =========================
   🧪 START EXAM
========================= */

function startExam(modo, data) {

  state.examenPreguntas = data.map(p => {

    let opciones = p.opciones.map((op, i) => ({
      texto: op,
      correcta: i === p.correcta
    }));

    shuffle(opciones);

    return {
      pregunta: p.pregunta,
      opciones
    };
  });

  state.modo = modo;
  state.actual = 0;
  state.respuestas = [];
  state.view = "examen";

  render();
}

/* =========================
   🧪 EXAMEN
========================= */

function viewExamen() {

  const p = state.examenPreguntas[state.actual];

  return `
    <h3>Pregunta ${state.actual + 1} / ${state.examenPreguntas.length}</h3>

    <div class="card">
      ${p.pregunta}
    </div>

    ${p.opciones.map(op =>
      `<button onclick="answer(${op.correcta ? 1 : 0})">
        ${op.texto}
      </button>`
    ).join("")}
  `;
}

/* =========================
   🎯 RESPUESTA
========================= */

function answer(ok) {

  state.respuestas[state.actual] = ok;

  state.actual++;

  if (state.actual >= state.examenPreguntas.length) {
    state.view = "resultado";
  }

  render();
}

/* =========================
   📊 RESULTADO
========================= */

function viewResultado() {

  let correctas = state.respuestas.filter(r => r === 1).length;

  return `
    <h2>📊 Resultado</h2>

    <p>Usuario: ${state.user}</p>
    <p>Modo: ${state.modo}</p>

    <p>✔ Correctas: ${correctas}</p>
    <p>❌ Fallos: ${state.examenPreguntas.length - correctas}</p>

    <p>Nota: ${(10 * correctas / state.examenPreguntas.length).toFixed(2)}</p>

    <button onclick="location.reload()">Volver</button>
  `;
}

/* =========================
   🔁 NAV
========================= */

function goSelector() {
  state.user = document.getElementById("user").value || "Anónimo";
  state.view = "selector";
  render();
}

/* ========================= */

init();

</script>

</body>
</html>
